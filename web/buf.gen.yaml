version: v2
inputs:
  - directory: ../proto
  # zmk-feature-custom-settings' custom_settings.proto, vendored into
  # web/proto/ (see the provenance/re-sync comment at the top of that file)
  # rather than read from ../dependencies/zmk-feature-custom-settings/proto.
  # The web-ui.yml CI workflow builds web/ standalone with plain `npm ci` --
  # it never runs `west update`, so a path outside this repo is not
  # available there. web/proto/ is a separate tree from the repo-root
  # proto/ used by CMakeLists.txt's firmware-side nanopb glob, so vendoring
  # it here does not create a second, conflicting copy for the firmware
  # build.
  - directory: proto
plugins:
  - local: protoc-gen-ts_proto
    opt:
      - outputServices=false
      - outputJsonMethods=false
      - outputClientImpl=false
      - useExactTypes=false
      - esModuleInterop=true
    out: src/proto
