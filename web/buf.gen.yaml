version: v2
inputs:
  - directory: ../proto
  # zmk-feature-custom-settings' custom_settings.proto, generated straight
  # from the west dependency checkout (not vendored into this repo's own
  # proto/ tree) so it is NOT picked up by this module's firmware-side
  # nanopb glob (CMakeLists.txt: proto/*.proto) -- that would generate a
  # second, conflicting copy of the cormoran.zmk.custom_settings package
  # and fail to link into any build that includes both modules (e.g. the
  # pmw3610_settings_rpc test artifact).
  - directory: ../dependencies/zmk-feature-custom-settings/proto
plugins:
  - local: protoc-gen-ts_proto
    opt:
      - outputServices=false
      - outputJsonMethods=false
      - outputClientImpl=false
      - useExactTypes=false
      - esModuleInterop=true
    out: src/proto
