name: Test ZMK Module

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - .github/workflows/copilot-setup-steps.yml
      - .github/workflows/devcontainer.yml
      - .github/workflows/claude.yml
      - .github/workflows/codex.yml
      - .github/workflows/template-sync.yml
      - .github/workflows/web-ui.yml
      - .github/actions/zmk-env/**
      - .gitignore
      - .claude/**
      - .codex/**
      - "LICENSE"
      - "web/**"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - .github/workflows/copilot-setup-steps.yml
      - .github/workflows/devcontainer.yml
      - .github/workflows/claude.yml
      - .github/workflows/codex.yml
      - .github/workflows/template-sync.yml
      - .github/workflows/web-ui.yml
      - .github/actions/zmk-env/**
      - .gitignore
      - .claude/**
      - .codex/**
      - "LICENSE"
      - "web/**"
  workflow_dispatch:
  schedule:
    # 20:00 JST every Friday (11:00 UTC)
    - cron: "0 11 * * 5"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: zmkfirmware/zmk-build-arm:stable
    name: Build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: ./.github/actions/west-init
      - name: Test
        run: python3 -m unittest -v
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zmk-firmware
          path: |
            build/*/zephyr/zmk.uf2

  renode-test:
    runs-on: ubuntu-latest
    # Building the renode artifact + installing Renode (cached after the
    # first run) + booting the emulator takes longer than a plain build.
    timeout-minutes: 20
    container:
      image: zmkfirmware/zmk-build-arm:stable
    name: Renode PMW3610 Test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: ./.github/actions/west-init
      - name: Build Renode firmware
        # Emulation-only image (PMW3610 driver + Studio/console over UART);
        # see tests/zmk-config/build-renode.yaml. Writes build/renode/.
        run: >-
          west zmk-build tests/zmk-config
          --build-yaml tests/zmk-config/build-renode.yaml -af renode
      - name: Cache Renode install
        uses: actions/cache@v4
        with:
          path: ~/.renode
          key: renode-1.16.1-${{ runner.os }}
      - name: Run Renode PMW3610 test
        # Boots the ELF against a simulated PMW3610 sensor (tests/renode/) and
        # drives the driver through init + motion reporting. --skip-smoke: the
        # generic smoke test boots on a sensor-less platform and expects a
        # bare GetDeviceInfo round-trip, which a Studio-enabled image answers
        # with an unsolicited boot notification first; the sensor test below
        # already asserts boot + init on the correct platform.
        run: >-
          west zmk-renode-test tests/renode
          --elf build/renode/zephyr/zmk.elf --skip-smoke

  renode-relay-test:
    runs-on: ubuntu-latest
    # Two real images booted on one Renode session + the Renode install.
    timeout-minutes: 20
    container:
      image: zmkfirmware/zmk-build-arm:stable
    name: Renode PMW3610 wired-split relay test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: ./.github/actions/west-init
      - name: Build usb+wired split halves
        # The Studio central + the split peripheral carrying the simulated
        # PMW3610; see tests/zmk-config/build-usb-split.yaml.
        run: >-
          west zmk-build tests/zmk-config
          --build-yaml tests/zmk-config/build-usb-split.yaml -af usb-wired-central &&
          west zmk-build tests/zmk-config
          --build-yaml tests/zmk-config/build-usb-split.yaml -af usb-wired-peripheral
      - name: Cache Renode install
        uses: actions/cache@v4
        with:
          path: ~/.renode
          key: renode-1.16.1-${{ runner.os }}
      - name: Run split-relay round-trip test
        # Host reads the split PERIPHERAL's PMW3610 over the wired split event
        # relay (tests/renode/pmw3610_usb_wired_split_relay_renode_test.py).
        # --skip-smoke: only this module's relay test, not the generic smoke.
        run: >-
          west zmk-renode-test --mode wired-split
          --elf build/usb-wired-central/zephyr/zmk.elf
          --peripheral-elf build/usb-wired-peripheral/zephyr/zmk.elf
          tests/renode --skip-smoke

  keepalive:
    if: github.event_name == 'schedule'
    permissions: write-all
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Re-enable workflow to avoid deactivating scheduled runs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_REPO: ${{ github.repository }}
        run: |
          gh workflow enable zmk-module.yml
