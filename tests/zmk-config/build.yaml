include:
  - artifact: pmw3610_disabled
    board: xiao_ble//zmk
    shield: tester_xiao

  - artifact: pmw3610_plain
    board: xiao_ble//zmk
    shield: tester_xiao
    snippet: pmw3610-trackball

  # Burst read OFF coverage (pmw3610_plain above is burst read ON, the
  # normal/recommended mode -- see the snippets' overlay comments). Only
  # the plain motion-reporting artifact is duplicated since burst read only
  # affects pmw3610_report_data()'s SPI transfer shape, not RPC/settings.
  - artifact: pmw3610_plain_no_burst
    board: xiao_ble//zmk
    shield: tester_xiao
    snippet: pmw3610-trackball-no-burst

  - artifact: pmw3610_rpc
    board: xiao_ble//zmk
    shield: tester_xiao
    cmake-args: -DCONFIG_ZMK_STUDIO=y -DCONFIG_ZMK_PMW3610_STUDIO_RPC=y
    snippets:
      - studio-rpc-usb-uart
      - pmw3610-trackball

  - artifact: pmw3610_settings_rpc
    board: xiao_ble//zmk
    shield: tester_xiao
    cmake-args: >-
      -DCONFIG_ZMK_STUDIO=y
      -DCONFIG_ZMK_PMW3610_STUDIO_RPC=y
      -DCONFIG_ZMK_CUSTOM_SETTINGS=y
      -DCONFIG_ZMK_CUSTOM_SETTINGS_STUDIO_RPC=y
      -DCONFIG_ZMK_PMW3610_CUSTOM_SETTINGS=y
    snippets:
      - studio-rpc-usb-uart
      - pmw3610-trackball

  # Two PMW3610 devices in one firmware image (DESIGN.md Phase F): proves
  # per-device settings entries ("<param>@<id>") compile without symbol
  # collisions for more than one devicetree instance, covering both the
  # explicit `settings-id` property and the devicetree-path-hash fallback.
  # See test.py for the ELF symbol assertions.
  - artifact: pmw3610_settings_rpc_dual
    board: xiao_ble//zmk
    shield: tester_xiao
    cmake-args: >-
      -DCONFIG_ZMK_STUDIO=y
      -DCONFIG_ZMK_PMW3610_STUDIO_RPC=y
      -DCONFIG_ZMK_CUSTOM_SETTINGS=y
      -DCONFIG_ZMK_CUSTOM_SETTINGS_STUDIO_RPC=y
      -DCONFIG_ZMK_PMW3610_CUSTOM_SETTINGS=y
    snippets:
      - studio-rpc-usb-uart
      - pmw3610-trackball-dual

  # Split keyboard build coverage (DESIGN.md Phase F): peripheral role (with
  # a real sensor) and central role (with the local RPC + relay bridge)
  # built as separate firmware images, proving both roles compile --
  # end-to-end relay behavior is covered by the native_sim
  # tests/split_peripheral test (no real split hardware in this
  # environment; see DESIGN.md).
  - artifact: pmw3610_split_peripheral
    board: xiao_ble//zmk
    shield: tester_xiao
    snippets:
      - pmw3610-trackball
      - pmw3610-split-rpc-relay

  - artifact: pmw3610_split_central
    board: xiao_ble//zmk
    shield: tester_xiao
    snippets:
      - studio-rpc-usb-uart
      - pmw3610-split-rpc-relay
      - pmw3610-split-central
