# pmw3610_ble_split central half (left) -- the Studio-advertising DUT that
# fronts the PMW3610 split RPC relay.
#
# LOAD-BEARING under Renode: cap the LL data length so encrypted on-air PDUs
# stay within the fake radio's cap. Must be 27 -- raising it (e.g. to 251, to
# make a large response single-PDU) BREAKS pairing entirely under Renode
# (verified). NB: a large relayed Studio response still cannot round-trip over
# emulated BLE regardless (Renode's soft link-layer desyncs on bidirectional
# multi-PDU data -- see the module README's "Known Renode limitation"); this
# shield is usable for a topology/liveness check, not the relay data round-trip.
CONFIG_BT_CTLR_DATA_LENGTH_MAX=27
