# pmw3610_ble_split central half (left) -- the Studio-advertising DUT that
# fronts the PMW3610 split RPC relay.
#
# LOAD-BEARING under Renode: cap the LL data length so every encrypted on-air
# PDU (payload + the fake CCM's 4-byte MIC) stays within Renode's radio packet
# cap. The central holds TWO encrypted links (split peripheral + host); DLE's
# effective value is min(local, remote), so this one cap (matched by the
# peripheral + host) keeps both links legal. See zmk-west-commands
# docs/renode-internals.md.
#
# NOTE: if the zmk-west-commands Renode BLE large-response fix removes the need
# for the 27-byte cap, this can be raised/dropped -- track that PR.
CONFIG_BT_CTLR_DATA_LENGTH_MAX=27
