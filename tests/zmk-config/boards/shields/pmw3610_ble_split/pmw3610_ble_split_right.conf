# pmw3610_ble_split peripheral half (right) -- real PMW3610 + split RPC relay.
#
# Same LOAD-BEARING large DLE as the central (see the left .conf) so relayed
# Studio responses ride single-PDU over the split link under Renode.
CONFIG_BT_CTLR_DATA_LENGTH_MAX=27

# The peripheral is a real (USB-CDC-console) image, so its console is silent
# under Renode. Route ZMK's logs to SEGGER RTT (a real, Kconfig-only path) at
# DBG so the harness can observe both the split "Security changed: ... level 2"
# line AND the PMW3610 driver's "PMW3610 initialized" / "x/y: N/N" lines from
# the simulated sensor. Deferred logging (default) -- LOG_MODE_IMMEDIATE can
# crash the soft link-layer under Renode's coarse quantum.
CONFIG_LOG=y
CONFIG_USE_SEGGER_RTT=y
CONFIG_LOG_BACKEND_RTT=y
CONFIG_ZMK_LOG_LEVEL_DBG=y
CONFIG_PMW3610_LOG_LEVEL_DBG=y
