# pmw3610_usb_wired_split CENTRAL half (left) -- the Studio DUT that fronts the
# PMW3610 split RPC relay and answers Studio RPC over the emulated USB CDC.
#
# The whole point of usb+wired: a WIRED split whose central STILL answers Studio
# RPC. USB consumes no UARTE, so the central keeps its console on uart0 AND
# drives the zmk,wired-split link on uart1, while Studio RPC rides the USB CDC
# from the studio-rpc-usb-uart snippet (added by build-usb-split.yaml, which
# also enables Studio + the PMW3610 RPC + the relay). USB therefore stays ON
# here (the shared dtsi keeps &usbd enabled and only disables the board console
# CDC), so the central boots on the real-image USB platform, exactly as usb mode
# does -- and, crucially, the Studio response transport is USB CDC, which (unlike
# the Renode Studio-UART TX path and the emulated BLE link) round-trips the large
# relayed PMW3610 response. BLE is OFF (this is a wired split, and no BLE also
# avoids the empty-NVS BLE controller oops under Renode).
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_WIRED_UART_MODE_INTERRUPT=y
CONFIG_ZMK_BLE=n

# No physical unlock key exists in the headless Renode test, so disable Studio
# locking -- otherwise every RPC (including the relayed GetInfo) is rejected with
# UNLOCK_REQUIRED and no relay is ever dispatched.
CONFIG_ZMK_STUDIO_LOCKING=n

# Console stays on uart0 (a Renode TCP terminal): the boot banner + the split
# link's log lines are read from it. Move the board's default console OFF the
# USB CDC so USB presents a single CDC (the Studio one) the DualCdcAcmBridge
# attaches to.
CONFIG_BOARD_SERIAL_BACKEND_CDC_ACM=n
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_LOG=y
CONFIG_LOG_PROCESS_THREAD_STARTUP_DELAY_MS=0
CONFIG_ZMK_LOG_LEVEL_DBG=y
