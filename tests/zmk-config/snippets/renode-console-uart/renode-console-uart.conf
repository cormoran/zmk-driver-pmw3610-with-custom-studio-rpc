# Renode-only console carrier for the hardware-free PMW3610 sensor test
# (tests/renode/pmw3610_renode_test.py). NB: nRF52840/XIAO-specific -- pairs
# with renode-console-uart.overlay (see that file's header).
#
# The pmw3610_renode_test drives the driver purely by reading its LOG lines
# (boot banner, "PMW3610 initialized", per-report "x/y: N/N") off a real
# console UART, so all this snippet has to do is make the XIAO image boot
# under Renode and speak its console over a hardware UART instead of USB-CDC.
#
# No USB (its nRF52840 HW model hangs forever under Renode), no BLE (avoids a
# controller-command-timeout kernel oops with an empty NVS/no controller under
# Renode), console+log wired to a real UART instead of the board's default
# USB-CDC path, and the board's "CDC ACM as serial backend" Kconfig cascade
# turned off (it silently re-enables USB_DEVICE_STACK and hangs the same way
# even with the overlay's DT nodes disabled).
#
# Studio RPC is intentionally NOT enabled here: this test never opens an RPC
# socket. The wired-split relay test (which does exercise Studio) carries it
# over real USB-CDC via the stock `studio-rpc-usb-uart` snippet instead.
CONFIG_ZMK_USB=n
CONFIG_ZMK_BLE=n
CONFIG_BOARD_SERIAL_BACKEND_CDC_ACM=n
CONFIG_LOG=y
# Zephyr's own default; included here defensively against a deferred-log
# ring-buffer overflow racing early boot before the log thread runs.
CONFIG_LOG_PROCESS_THREAD_STARTUP_DELAY_MS=0
CONFIG_CONSOLE=y
# CONFIG_SERIAL is enabled explicitly: with USB off, nothing else pulls in the
# serial driver subsystem, and UART_CONSOLE/UART_INTERRUPT_DRIVEN silently drop
# to n (unmet SERIAL dependency) without it -- leaving the console mute.
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_INTERRUPT_DRIVEN=y
