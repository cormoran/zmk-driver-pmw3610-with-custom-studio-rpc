# Base split-relay config: peripheral role by default (CONFIG_ZMK_SPLIT_ROLE_CENTRAL
# unset). Combine with the pmw3610-split-central snippet for a central-role build.
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_BLE=y
CONFIG_ZMK_SPLIT_RELAY_EVENT=y
# See pmw3610.options and Kconfig help for ZMK_PMW3610_SPLIT_RPC_RELAY: a
# relayed GetInfoResponse for two devices needs ~218 bytes, comfortably
# under the transport's 255-byte hard ceiling but well above the 128
# default.
CONFIG_ZMK_SPLIT_RELAY_EVENT_DATA_LEN=224

CONFIG_ZMK_PMW3610_SPLIT_RPC_RELAY=y
