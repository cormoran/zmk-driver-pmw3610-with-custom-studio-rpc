# Base split-relay config: peripheral role by default (CONFIG_ZMK_SPLIT_ROLE_CENTRAL
# unset). Combine with the pmw3610-split-central snippet for a central-role build.
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_BLE=y
CONFIG_ZMK_SPLIT_RELAY_EVENT=y
# See pmw3610.options and Kconfig help for ZMK_PMW3610_SPLIT_RPC_RELAY: the
# largest relayed message (a Notification wrapping a two-device
# GetInfoResponse's PeripheralResponse) needs ~231 bytes, comfortably under
# the transport's 255-byte hard ceiling but well above the 128 default.
CONFIG_ZMK_SPLIT_RELAY_EVENT_DATA_LEN=240

CONFIG_ZMK_PMW3610_SPLIT_RPC_RELAY=y

# Every relay listener in src/split/pmw3610_relay.c (and frame streaming's
# capture loop in src/studio/pmw3610_request_exec.c) defers its protobuf
# decode/exec/encode work onto ZMK's dedicated low-priority workqueue
# (zmk_workqueue_lowprio_work_q()) instead of running inline on whatever
# thread ZMK core dispatched the relay/split event from (the system
# workqueue, on both roles) -- see the file-level comment in pmw3610_relay.c.
# That chain (decode -> pmw3610_request_exec_handle() -> nanopb-encode ->
# ZMK core's own relay-out path) overflows the default 2048-byte stack with
# a 240-byte relay payload (confirmed on real hardware: MPU fault / stack
# overflow). Give the low-priority thread's own stack headroom instead of
# growing CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE, which would otherwise bloat
# every other system workqueue consumer's stack requirement too.
CONFIG_ZMK_LOW_PRIORITY_THREAD_STACK_SIZE=4096
