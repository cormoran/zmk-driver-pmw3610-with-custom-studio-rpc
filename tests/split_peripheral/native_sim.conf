CONFIG_GPIO=n
CONFIG_ZMK_BLE=n
CONFIG_LOG=y
CONFIG_LOG_BACKEND_SHOW_COLOR=n

# Peripheral role (CONFIG_ZMK_SPLIT_ROLE_CENTRAL unset = n): exercises the
# src/split/pmw3610_relay.c peripheral executor with zero local PMW3610
# devices (native_sim has no devicetree node for the sensor), via the
# CONFIG_ZMK_PMW3610_SPLIT_RPC_RELAY_TEST self-test (see DESIGN.md Phase F).
# native_sim cannot exercise the real split BLE transport end-to-end, so
# this synthesizes a relayed request locally instead of over the air.
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_RELAY_EVENT=y
# Default (128) is too small for the largest relayed message -- a
# Notification wrapping a PeripheralResponse for a two-device
# GetInfoResponse needs ~231 bytes (see pmw3610.options and Kconfig help
# for ZMK_PMW3610_SPLIT_RPC_RELAY). Comfortably under the relay transport's
# 255-byte hard ceiling (relay_event_header.event_data_size is a uint8_t).
CONFIG_ZMK_SPLIT_RELAY_EVENT_DATA_LEN=240

CONFIG_ZMK_PMW3610_SPLIT_RPC_RELAY=y
CONFIG_ZMK_PMW3610_SPLIT_RPC_RELAY_TEST=y
